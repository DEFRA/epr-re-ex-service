services:
  proxy:
    image: nginxproxy/nginx-proxy:1.10
    ports:
      - '7300:80'
    environment:
      - ENABLE_IPV6=true
      - DEFAULT_ROOT="418"
      - DEFAULT_HOST=~^uploader\..*\.sslip\.io
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro
    networks:
      - cdp-tenant

  floci:
    image: hectorvent/floci:1.5.3
    ports:
      - '4566:4566'
    environment:
      FLOCI_HOSTNAME: floci
      FLOCI_DEFAULT_REGION: eu-west-2
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    networks:
      - cdp-tenant

  floci-init:
    image: amazon/aws-cli:2.17.43
    entrypoint: /bin/sh
    command: /setup/init.sh
    depends_on:
      floci:
        condition: service_started
    environment:
      AWS_ENDPOINT_URL: http://floci:4566
      AWS_REGION: eu-west-2
      AWS_DEFAULT_REGION: eu-west-2
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    volumes:
      - ./compose/floci:/setup:ro
      - ./lib/epr-backend-journey-tests/docker/scripts/floci/summarylogs:/summarylogs:ro
    networks:
      - cdp-tenant

  mongodb:
    image: mongo:7.0.31
    networks:
      - cdp-tenant
    ports:
      - '27017:27017'
    volumes:
      - mongodb-data:/data
      - ./mongodb-backups:/backups

  redis:
    image: redis:8.0.6-alpine3.21
    healthcheck:
      test: ['CMD', 'redis-cli', 'PING']
      interval: 5s
      start_period: 2s
      retries: 5
    networks:
      - cdp-tenant
    ports:
      - '6379:6379'
    volumes:
      - data-redis:/data

  cdp-uploader:
    image: defradigital/cdp-uploader:1.15.0
    ports:
      - '7337:7337'
    depends_on:
      floci-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    env_file:
      - ./compose/aws.env
    environment:
      CONSUMER_BUCKETS: re-ex-summary-logs,re-ex-overseas-sites
      MOCK_VIRUS_RESULT_DELAY: 3
      MOCK_VIRUS_SCAN_ENABLED: true
      NODE_ENV: development
      PORT: 7337
      REDIS_HOST: redis
      S3_ENDPOINT: http://floci:4566
      SQS_ENDPOINT: http://floci:4566
      # Floci requires path-form queue URLs (/<account>/<name>) for ReceiveMessage;
      # cdp-uploader's baked defaults are bare names — override them here.
      SQS_SCAN_RESULTS: http://floci:4566/000000000000/cdp-clamav-results
      SQS_SCAN_RESULTS_CALLBACK: http://floci:4566/000000000000/cdp-uploader-scan-results-callback.fifo
      SQS_DOWNLOAD_REQUESTS: http://floci:4566/000000000000/cdp-uploader-download-requests
      SQS_MOCK_CLAMAV: http://floci:4566/000000000000/mock-clamav
      USE_SINGLE_INSTANCE_CACHE: true
      VIRTUAL_HOST: ~^uploader\..*\.sslip\.io
      VIRTUAL_PATH: /
      VIRTUAL_PORT: 7337
    extra_hosts:
      - 'localhost:host-gateway'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:7337/health']
      interval: 5s
      start_period: 10s
      retries: 5
    networks:
      - cdp-tenant

  defra-id-stub:
    image: defradigital/cdp-defra-id-stub:${DEFRA_ID_STUB_VERSION:-latest}
    ports:
      - '3200:3200'
    depends_on:
      redis:
        condition: service_healthy
    environment:
      APP_BASE_URL: http://defra-id-stub:3200
      NODE_ENV: development
      OIDC_BASE_PATH: /cdp-defra-id-stub
      OIDC_CLIENT_ID: 63983fc2-cfff-45bb-8ec2-959e21062b9a
      OIDC_CLIENT_SECRET: test_value
      OIDC_SHOW_LOGIN: true
      PORT: 3200
      REDIS_HOST: redis
      SESSION_CACHE_ENGINE: redis
      USE_SINGLE_INSTANCE_CACHE: true
    networks:
      - cdp-tenant

  entra-stub:
    image: defradigital/epr-re-ex-entra-stub:${ENTRA_STUB_VERSION:-latest}
    ports:
      - '3010:3010'
    depends_on:
      redis:
        condition: service_healthy
    environment:
      CALLBACK_BASE_URL: ${ENTRA_CALLBACK_BASE_URL:-http://localhost:3002}
      ENTRA_CLIENT_ID: ${ENTRA_CLIENT_ID:-bd06da51-53f6-46d0-a9f0-ac562864c887}
      ENTRA_CLIENT_SECRET: ${ENTRA_CLIENT_SECRET:-test}
      NODE_ENV: development
      PORT: 3010
      REDIS_HOST: redis
      STUB_EXTERNAL_URL: http://localhost:3010
      STUB_INTERNAL_URL: http://entra-stub:3010
      USE_SINGLE_INSTANCE_CACHE: true
    networks:
      - cdp-tenant

  # Copies cognito seed files into a volume so cognito-stub has its own copies
  cognito-stub-init:
    image: alpine:3.23.3
    volumes:
      - ./compose/cognito-local/clients.json:/seed/clients.json:ro
      - ./compose/cognito-local/local_4D8shcYm.json:/seed/local_4D8shcYm.json:ro
      - cognito-db:/target
    command: sh -c "cp /seed/clients.json /seed/local_4D8shcYm.json /target/"
    networks:
      - cdp-tenant

  cognito-stub:
    image: jagregory/cognito-local:5.1.0
    ports:
      - '9229:9229'
    depends_on:
      cognito-stub-init:
        condition: service_completed_successfully
    volumes:
      - cognito-db:/app/.cognito/db
    networks:
      - cdp-tenant

  wire-mock:
    profiles: ['all', 'epr-backend']
    image: wiremock/wiremock:3.13.2
    ports:
      - '3100:8080'
    volumes:
      - ./compose/wire-mock:/home/wiremock
    command:
      - --global-response-templating
      - --verbose
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8080/__admin/health']
      interval: 5s
      start_period: 5s
      retries: 5
    networks:
      - cdp-tenant

  ################################################################################

  epr-admin-frontend:
    profiles: ['all', 'epr-admin-frontend']
    image: defradigital/epr-re-ex-admin-frontend:${ADMIN_FRONTEND_VERSION:-latest}
    pull_policy: ${PULL_POLICY:-build}
    build:
      context: ./lib/epr-re-ex-admin-frontend
      dockerfile: Dockerfile.local
    ports:
      - '3002:3002'
    extra_hosts:
      - 'localhost:host-gateway'
    develop:
      watch:
        - path: ./lib/epr-re-ex-admin-frontend/src/
          action: sync
          target: /app/src/
          ignore:
            - node_modules/
        - path: ./lib/epr-re-ex-admin-frontend/.browserslistrc
          action: rebuild
        - path: ./lib/epr-re-ex-admin-frontend/babel.config.cjs
          action: rebuild
        - path: ./lib/epr-re-ex-admin-frontend/nodemon.json
          action: rebuild
        - path: ./lib/epr-re-ex-admin-frontend/package.json
          action: rebuild
        - path: ./lib/epr-re-ex-admin-frontend/webpack.config.js
          action: rebuild
    depends_on:
      floci-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    env_file:
      - ./compose/aws.env
    environment:
      ENTRA_CLIENT_SECRET: ${ENTRA_CLIENT_SECRET:-test}
      ENTRA_CLIENT_ID: ${ENTRA_CLIENT_ID:-clientId}
      ENTRA_TENANT_ID: ${ENTRA_TENANT_ID:-tenantId}
      EPR_BACKEND_URL: http://epr-backend:3001
      NODE_ENV: development
      OIDC_WELL_KNOWN_CONFIGURATION_URL: ${ENTRA_OIDC_WELL_KNOWN_CONFIGURATION_URL:-http://entra-stub:3010/.well-known/openid-configuration}
      PORT: 3002
      REDIS_HOST: redis
      SESSION_CACHE_ENGINE: ${SESSION_CACHE_ENGINE:-memory}
      USE_SINGLE_INSTANCE_CACHE: true
    networks:
      - cdp-tenant

  epr-frontend:
    profiles: ['all', 'epr-frontend']
    image: defradigital/epr-frontend:${FRONTEND_VERSION:-latest}
    pull_policy: ${PULL_POLICY:-build}
    build:
      context: ./lib/epr-frontend
      dockerfile: Dockerfile.local
    ports:
      - '3000:3000'
    extra_hosts:
      - 'localhost:host-gateway'
    develop:
      watch:
        - path: ./lib/epr-frontend/src/
          action: sync
          target: /app/src/
          ignore:
            - node_modules/
        - path: ./lib/epr-frontend/.browserslistrc
          action: rebuild
        - path: ./lib/epr-frontend/babel.config.cjs
          action: rebuild
        - path: ./lib/epr-frontend/nodemon.json
          action: rebuild
        - path: ./lib/epr-frontend/package.json
          action: rebuild
        - path: ./lib/epr-frontend/tsconfig.json
          action: rebuild
        - path: ./lib/epr-frontend/webpack.config.js
          action: rebuild
    depends_on:
      defra-id-stub:
        condition: service_started
      floci-init:
        condition: service_completed_successfully
      redis:
        condition: service_started
    env_file:
      - ./compose/aws.env
    environment:
      DEFRA_ID_CLIENT_ID: ${DEFRA_ID_CLIENT_ID:-63983fc2-cfff-45bb-8ec2-959e21062b9a}
      DEFRA_ID_CLIENT_SECRET: ${DEFRA_ID_CLIENT_SECRET:-test_value}
      DEFRA_ID_OIDC_CONFIGURATION_URL: ${DEFRA_ID_OIDC_CONFIGURATION_URL:-http://defra-id-stub:3200/cdp-defra-id-stub/.well-known/openid-configuration}
      DEFRA_ID_SERVICE_ID: ${DEFRA_ID_SERVICE_ID:-d7d72b79-9c62-ee11-8df0-000d3adf7047}
      EPR_BACKEND_URL: http://epr-backend:3001
      FEATURE_FLAG_REPORTS: ${FEATURE_FLAG_REPORTS:-false}
      NODE_ENV: development
      PORT: 3000
      REDIS_HOST: redis
      SESSION_CACHE_ENGINE: ${SESSION_CACHE_ENGINE:-memory}
      USE_SINGLE_INSTANCE_CACHE: true
      WASTE_ORGANISATIONS_API_USE_INMEMORY: ${WASTE_ORGANISATIONS_API_USE_INMEMORY:-false}
      WASTE_ORGANISATIONS_API_URL: http://wire-mock:8080/waste-organisations/organisations
      WASTE_ORGANISATIONS_API_USERNAME: testuser
      WASTE_ORGANISATIONS_API_PASSWORD: testpassword
    networks:
      - cdp-tenant

  epr-backend:
    profiles: ['all', 'epr-backend']
    image: defradigital/epr-backend:${BACKEND_VERSION:-latest}
    pull_policy: ${PULL_POLICY:-build}
    build:
      context: ./lib/epr-backend
      target: development
      dockerfile: ./Dockerfile
    ports:
      - '3001:3001'
    extra_hosts:
      - 'localhost:host-gateway'
    depends_on:
      cdp-uploader:
        condition: service_healthy
      cognito-stub:
        condition: service_started
      wire-mock:
        condition: service_healthy
      floci-init:
        condition: service_completed_successfully
      mongodb:
        condition: service_started
    env_file:
      - ./compose/aws.env
    environment:
      ADMIN_UI_ENTRA_CLIENT_ID: ${ENTRA_CLIENT_ID:-clientId}
      APP_BASE_URL: http://epr-backend:3001
      AUDIT_ENABLED: true
      CDP_UPLOADER_URL: http://cdp-uploader:7337
      COPY_FILES_UPLOADED_FROM_DATE: ${COPY_FILES_UPLOADED_FROM_DATE:-2025-12-01T00:00:00.000Z}
      DEFRA_ID_CLIENT_ID: ${DEFRA_ID_CLIENT_ID:-63983fc2-cfff-45bb-8ec2-959e21062b9a}
      DEFRA_ID_OIDC_WELL_KNOWN_URL: ${DEFRA_ID_OIDC_WELL_KNOWN_URL:-http://defra-id-stub:3200/cdp-defra-id-stub/.well-known/openid-configuration}
      ENTRA_OIDC_WELL_KNOWN_CONFIGURATION_URL: ${ENTRA_OIDC_WELL_KNOWN_CONFIGURATION_URL:-http://entra-stub:3010/.well-known/openid-configuration}
      FEATURE_FLAG_COPY_FORM_FILES_TO_S3: ${FEATURE_FLAG_COPY_FORM_FILES_TO_S3:-true}
      FEATURE_FLAG_DEV_ENDPOINTS: ${FEATURE_FLAG_DEV_ENDPOINTS:-true}
      FEATURE_FLAG_REPORTS: ${FEATURE_FLAG_REPORTS:-false}
      FEATURE_FLAG_ALLOW_FULL_ERROR_OUTPUT: ${FEATURE_FLAG_ALLOW_FULL_ERROR_OUTPUT:-true}
      FORM_FILE_UPLOADS_S3_BUCKET: ${FORM_FILE_UPLOADS_S3_BUCKET:-re-ex-form-uploads}
      FORMS_SUBMISSION_EXTERNAL_API_CLIENT_ID: ${FORMS_SUBMISSION_EXTERNAL_API_CLIENT_ID:-test-client-id}
      FORMS_SUBMISSION_EXTERNAL_API_CLIENT_SECRET: ${FORMS_SUBMISSION_EXTERNAL_API_CLIENT_SECRET:-test-client-secret}
      FORMS_SUBMISSION_EXTERNAL_API_COGNITO_TOKEN_URL: ${FORMS_SUBMISSION_EXTERNAL_API_COGNITO_TOKEN_URL:-http://wire-mock:8080/forms-submission-api/oauth2/token}
      FORMS_SUBMISSION_EXTERNAL_API_URL: ${FORMS_SUBMISSION_EXTERNAL_API_URL:-http://wire-mock:8080/forms-submission-api}
      GOVUK_NOTIFY_API_KEY: /run/secrets/govuk_notify_api_key
      LOG_FORMAT: ${LOG_FORMAT:-ecs}
      MONGO_URI: mongodb://mongodb:27017/
      NODE_ENV: development
      PACKAGING_RECYCLING_NOTES_EXTERNAL_API_CLIENT_ID: ${PACKAGING_RECYCLING_NOTES_EXTERNAL_API_CLIENT_ID:-5357lgchj0h0fuomqyas5r87u}
      PACKAGING_RECYCLING_NOTES_EXTERNAL_API_JWKS_URL: ${PACKAGING_RECYCLING_NOTES_EXTERNAL_API_JWKS_URL:-http://cognito-stub:9229/local_4D8shcYm/.well-known/jwks.json}
      PORT: 3001
      S3_ENDPOINT: http://floci:4566
      SERVICE_MAINTAINER_EMAILS: ${SERVICE_MAINTAINER_EMAILS:-["customer.test.user.2@defradev.onmicrosoft.com", "ea@test.gov.uk", "nrw@test.gov.uk", "niea@test.gov.uk"]}
      SQS_ENDPOINT: http://floci:4566
      WASTE_ORGANISATIONS_API_USE_INMEMORY: ${WASTE_ORGANISATIONS_API_USE_INMEMORY:-false}
    secrets:
      - govuk_notify_api_key
    networks:
      - cdp-tenant
    volumes:
      - ./lib/epr-backend/src:/home/node/src
      - ./lib/epr-backend/package.json:/home/node/package.json

  ################################################################################

  selenium-chrome:
    profiles: ['all', 'journey-test']
    image: selenium/standalone-chrome:145.0
    platform: linux/amd64
    ports:
      - 4444:4444
    environment:
      SE_NODE_MAX_SESSIONS: 5
    network_mode: host

################################################################################

volumes:
  cognito-db:
  data-redis:
  mongodb-data:
  mongodb-backups:
    external: true

networks:
  cdp-tenant:
    driver: bridge
    name: cdp-tenant

secrets:
  govuk_notify_api_key:
    environment: GOVUK_NOTIFY_API_KEY
