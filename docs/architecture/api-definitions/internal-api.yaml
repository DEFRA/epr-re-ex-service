{
  "basePath": "/",
  "info": {
    "title": "EPR Re-Ex Backend Internal API",
    "version": "1"
  },
  "swagger": "2.0",
  "host": "localhost:3001",
  "schemes": [
    "http"
  ],
  "tags": [
    { "name": "health", "description": "Health check" },
    { "name": "apply", "description": "Organisation, registration and accreditation applications" },
    { "name": "organisations", "description": "Organisation management" },
    { "name": "summary-logs", "description": "Waste summary log uploads" },
    { "name": "reports", "description": "Periodic reporting (feature-flagged)" },
    { "name": "waste-balances", "description": "Waste balance queries" },
    { "name": "tonnage", "description": "Tonnage monitoring and PRN tonnage" },
    { "name": "packaging-recycling-notes", "description": "PRN lifecycle management" },
    { "name": "overseas-sites", "description": "Overseas site management (feature-flagged)" },
    { "name": "system-logs", "description": "System audit logs" },
    { "name": "public-register", "description": "Public register generation" },
    { "name": "dev", "description": "Development-only endpoints (feature-flagged)" }
  ],
  "paths": {
    "/health": {
      "get": {
        "operationId": "getHealth",
        "tags": ["health"],
        "responses": {
          "200": {
            "description": "Successful",
            "schema": {
              "type": "object",
              "properties": {
                "message": { "type": "string", "enum": ["success"] }
              },
              "required": ["message"]
            }
          }
        }
      }
    },
    "/v1/apply/organisation": {
      "post": {
        "operationId": "postV1ApplyOrganisation",
        "tags": ["apply"],
        "parameters": [
          {
            "in": "body",
            "name": "body",
            "schema": { "$ref": "#/definitions/ApplyPayload" }
          }
        ],
        "responses": {
          "200": {
            "description": "Organisation created",
            "schema": {
              "type": "object",
              "properties": {
                "orgId": { "type": "number" },
                "orgName": { "type": "string" },
                "referenceNumber": { "type": "string" }
              }
            }
          }
        }
      }
    },
    "/v1/apply/registration": {
      "post": {
        "operationId": "postV1ApplyRegistration",
        "tags": ["apply"],
        "parameters": [
          {
            "in": "body",
            "name": "body",
            "schema": { "$ref": "#/definitions/RegistrationAndAccreditationPayload" }
          }
        ],
        "responses": {
          "default": {
            "description": "Registration created",
            "schema": { "type": "object" }
          }
        }
      }
    },
    "/v1/apply/accreditation": {
      "post": {
        "operationId": "postV1ApplyAccreditation",
        "tags": ["apply"],
        "parameters": [
          {
            "in": "body",
            "name": "body",
            "schema": { "$ref": "#/definitions/RegistrationAndAccreditationPayload" }
          }
        ],
        "responses": {
          "default": {
            "description": "Accreditation created",
            "schema": { "type": "object" }
          }
        }
      }
    },
    "/v1/organisations": {
      "get": {
        "operationId": "getV1Organisations",
        "tags": ["organisations"],
        "responses": {
          "200": {
            "description": "List of organisations",
            "schema": {
              "type": "array",
              "items": { "type": "object" }
            }
          }
        }
      }
    },
    "/v1/organisations/{organisationId}": {
      "get": {
        "operationId": "getV1OrganisationById",
        "tags": ["organisations"],
        "parameters": [
          {
            "type": "string",
            "name": "organisationId",
            "in": "path",
            "required": true
          }
        ],
        "responses": {
          "200": {
            "description": "Single organisation",
            "schema": { "type": "object" }
          }
        }
      }
    },
    "/v1/organisations/{id}": {
      "put": {
        "operationId": "putV1OrganisationById",
        "tags": ["organisations"],
        "parameters": [
          {
            "type": "string",
            "name": "id",
            "in": "path",
            "required": true
          },
          {
            "in": "body",
            "name": "body",
            "schema": {
              "type": "object",
              "properties": {
                "version": { "type": "number" },
                "updateFragment": { "type": "object" }
              },
              "required": ["version", "updateFragment"]
            }
          }
        ],
        "responses": {
          "200": {
            "description": "Updated organisation",
            "schema": { "type": "object" }
          }
        }
      }
    },
    "/v1/organisations/{organisationId}/link": {
      "post": {
        "operationId": "postV1OrganisationLink",
        "tags": ["organisations"],
        "parameters": [
          {
            "type": "string",
            "name": "organisationId",
            "in": "path",
            "required": true
          }
        ],
        "responses": {
          "200": {
            "description": "Organisation linked",
            "schema": {
              "type": "object",
              "properties": {
                "status": { "type": "string" },
                "linked": {
                  "type": "object",
                  "properties": {
                    "id": { "type": "string" },
                    "name": { "type": "string" },
                    "linkedAt": { "type": "string", "format": "date-time" },
                    "linkedBy": { "type": "string" }
                  }
                }
              }
            }
          }
        }
      }
    },
    "/v1/linked-organisations": {
      "get": {
        "operationId": "getV1LinkedOrganisations",
        "tags": ["organisations"],
        "parameters": [
          {
            "type": "string",
            "name": "name",
            "in": "query",
            "required": false
          }
        ],
        "responses": {
          "200": {
            "description": "List of linked organisations",
            "schema": { "$ref": "#/definitions/LinkedOrganisationsResponse" }
          }
        }
      }
    },
    "/v1/me/organisations": {
      "get": {
        "operationId": "getV1MeOrganisations",
        "tags": ["organisations"],
        "responses": {
          "200": {
            "description": "Current user's organisations",
            "schema": {
              "type": "object",
              "properties": {
                "organisations": {
                  "type": "object",
                  "properties": {
                    "current": { "type": "object" },
                    "linked": { "type": "object" },
                    "unlinked": { "type": "object" }
                  }
                }
              }
            }
          }
        }
      }
    },
    "/v1/form-submissions/{documentId}": {
      "get": {
        "operationId": "getV1FormSubmissionById",
        "tags": ["organisations"],
        "parameters": [
          {
            "type": "string",
            "name": "documentId",
            "in": "path",
            "required": true
          }
        ],
        "responses": {
          "200": {
            "description": "Form submission details",
            "schema": {
              "type": "object",
              "properties": {
                "organisation": { "type": "object" },
                "registrations": { "type": "array", "items": { "type": "object" } },
                "accreditations": { "type": "array", "items": { "type": "object" } }
              }
            }
          }
        }
      }
    },
    "/v1/system-logs": {
      "get": {
        "operationId": "getV1SystemLogs",
        "tags": ["system-logs"],
        "parameters": [
          {
            "type": "string",
            "name": "organisationId",
            "in": "query",
            "required": true
          },
          {
            "type": "number",
            "name": "limit",
            "in": "query",
            "required": false,
            "minimum": 1
          },
          {
            "type": "string",
            "name": "cursor",
            "in": "query",
            "required": false,
            "description": "24-character hex string for pagination"
          }
        ],
        "responses": {
          "200": {
            "description": "Paginated system logs",
            "schema": {
              "type": "object",
              "properties": {
                "systemLogs": { "type": "array", "items": { "type": "object" } },
                "hasMore": { "type": "boolean" },
                "nextCursor": { "type": "string" }
              },
              "required": ["systemLogs", "hasMore"]
            }
          }
        }
      }
    },
    "/v1/organisations/{organisationId}/registrations/{registrationId}/summary-logs": {
      "post": {
        "operationId": "postV1SummaryLogs",
        "tags": ["summary-logs"],
        "parameters": [
          { "type": "string", "name": "organisationId", "in": "path", "required": true },
          { "type": "string", "name": "registrationId", "in": "path", "required": true },
          {
            "in": "body",
            "name": "body",
            "schema": { "$ref": "#/definitions/SummaryLogsCreatePayload" }
          }
        ],
        "responses": {
          "201": {
            "description": "Summary log created",
            "schema": {
              "type": "object",
              "properties": {
                "summaryLogId": { "type": "string" },
                "uploadId": { "type": "string" },
                "uploadUrl": { "type": "string" },
                "statusUrl": { "type": "string" }
              },
              "required": ["summaryLogId", "uploadId", "uploadUrl", "statusUrl"]
            }
          }
        }
      }
    },
    "/v1/organisations/{organisationId}/registrations/{registrationId}/summary-logs/{summaryLogId}": {
      "get": {
        "operationId": "getV1SummaryLogById",
        "tags": ["summary-logs"],
        "parameters": [
          { "type": "string", "name": "organisationId", "in": "path", "required": true },
          { "type": "string", "name": "registrationId", "in": "path", "required": true },
          { "type": "string", "name": "summaryLogId", "in": "path", "required": true },
          { "type": "string", "name": "uploadId", "in": "query", "required": false }
        ],
        "responses": {
          "200": {
            "description": "Summary log details",
            "schema": { "$ref": "#/definitions/SummaryLogResponse" }
          }
        }
      }
    },
    "/v1/organisations/{organisationId}/registrations/{registrationId}/summary-logs/{summaryLogId}/submit": {
      "post": {
        "operationId": "postV1SummaryLogSubmit",
        "tags": ["summary-logs"],
        "parameters": [
          { "type": "string", "name": "organisationId", "in": "path", "required": true },
          { "type": "string", "name": "registrationId", "in": "path", "required": true },
          { "type": "string", "name": "summaryLogId", "in": "path", "required": true }
        ],
        "responses": {
          "200": {
            "description": "Summary log submitted",
            "schema": { "$ref": "#/definitions/SummaryLogResponse" }
          }
        }
      }
    },
    "/v1/organisations/{organisationId}/registrations/{registrationId}/summary-logs/{summaryLogId}/upload-completed": {
      "post": {
        "operationId": "postV1SummaryLogUploadCompleted",
        "tags": ["summary-logs"],
        "parameters": [
          { "type": "string", "name": "organisationId", "in": "path", "required": true },
          { "type": "string", "name": "registrationId", "in": "path", "required": true },
          { "type": "string", "name": "summaryLogId", "in": "path", "required": true },
          {
            "in": "body",
            "name": "body",
            "schema": { "$ref": "#/definitions/UploadCompletedPayload" }
          }
        ],
        "responses": {
          "202": {
            "description": "Upload completion acknowledged"
          }
        }
      }
    },
    "/v1/organisations/registrations/summary-logs/reports/uploads": {
      "get": {
        "operationId": "getV1SummaryLogUploadsReport",
        "tags": ["summary-logs"],
        "responses": {
          "200": {
            "description": "Summary log uploads report",
            "schema": { "$ref": "#/definitions/SummaryLogUploadsReportResponse" }
          }
        }
      }
    },
    "/v1/organisations/{organisationId}/waste-balances": {
      "get": {
        "operationId": "getV1WasteBalances",
        "tags": ["waste-balances"],
        "parameters": [
          {
            "type": "string",
            "name": "organisationId",
            "in": "path",
            "required": true,
            "description": "24-character hex string"
          },
          {
            "type": "string",
            "name": "accreditationIds",
            "in": "query",
            "required": true,
            "description": "Comma-separated 24-character hex IDs"
          }
        ],
        "responses": {
          "200": {
            "description": "Waste balances keyed by accreditation ID",
            "schema": { "$ref": "#/definitions/WasteBalanceResponse" }
          }
        }
      }
    },
    "/v1/waste-balance-availability": {
      "get": {
        "operationId": "getV1WasteBalanceAvailability",
        "tags": ["waste-balances"],
        "responses": {
          "200": {
            "description": "Available waste balances by material",
            "schema": { "$ref": "#/definitions/WasteBalanceAvailabilityResponse" }
          }
        }
      }
    },
    "/v1/tonnage-monitoring": {
      "get": {
        "operationId": "getV1TonnageMonitoring",
        "tags": ["tonnage"],
        "responses": {
          "200": {
            "description": "Tonnage monitoring data by material and month",
            "schema": { "$ref": "#/definitions/TonnageMonitoringResponse" }
          }
        }
      }
    },
    "/v1/prn-tonnage": {
      "get": {
        "operationId": "getV1PrnTonnage",
        "tags": ["tonnage"],
        "responses": {
          "200": {
            "description": "PRN tonnage report",
            "schema": { "$ref": "#/definitions/PrnTonnageResponse" }
          }
        }
      }
    },
    "/v1/public-register/generate": {
      "post": {
        "operationId": "postV1PublicRegisterGenerate",
        "tags": ["public-register"],
        "responses": {
          "201": {
            "description": "Public register generated",
            "schema": {
              "type": "object",
              "properties": {
                "status": { "type": "string", "enum": ["generated"] },
                "downloadUrl": { "type": "string" },
                "generatedAt": { "type": "string", "format": "date-time" },
                "expiresAt": { "type": "string", "format": "date-time" }
              },
              "required": ["status", "downloadUrl", "generatedAt", "expiresAt"]
            }
          }
        }
      }
    },
    "/v1/organisations/{organisationId}/registrations/{registrationId}/reports": {
      "get": {
        "operationId": "getV1Reports",
        "tags": ["reports"],
        "description": "Behind isReportsEnabled feature flag",
        "parameters": [
          { "type": "string", "name": "organisationId", "in": "path", "required": true },
          { "type": "string", "name": "registrationId", "in": "path", "required": true }
        ],
        "responses": {
          "200": {
            "description": "Reporting periods for a registration",
            "schema": {
              "type": "object",
              "properties": {
                "cadence": { "type": "string", "enum": ["monthly", "quarterly"] },
                "periods": {
                  "type": "array",
                  "items": { "$ref": "#/definitions/ReportingPeriod" }
                }
              },
              "required": ["cadence", "periods"]
            }
          }
        }
      }
    },
    "/v1/organisations/{organisationId}/registrations/{registrationId}/reports/{year}/{period}": {
      "get": {
        "operationId": "getV1ReportDetail",
        "tags": ["reports"],
        "description": "Behind isReportsEnabled feature flag",
        "parameters": [
          { "type": "string", "name": "organisationId", "in": "path", "required": true },
          { "type": "string", "name": "registrationId", "in": "path", "required": true },
          { "type": "integer", "name": "year", "in": "path", "required": true, "minimum": 2024, "maximum": 2100 },
          { "type": "integer", "name": "period", "in": "path", "required": true, "minimum": 1, "maximum": 12 }
        ],
        "responses": {
          "200": {
            "description": "Detailed report for a specific period",
            "schema": { "$ref": "#/definitions/ReportDetail" }
          }
        }
      }
    },
    "/v1/organisations/{organisationId}/registrations/{registrationId}/accreditations/{accreditationId}/packaging-recycling-notes": {
      "get": {
        "operationId": "getV1PrnsByAccreditation",
        "tags": ["packaging-recycling-notes"],
        "parameters": [
          { "type": "string", "name": "organisationId", "in": "path", "required": true },
          { "type": "string", "name": "registrationId", "in": "path", "required": true },
          { "type": "string", "name": "accreditationId", "in": "path", "required": true }
        ],
        "responses": {
          "200": {
            "description": "List of PRNs for an accreditation",
            "schema": {
              "type": "array",
              "items": { "$ref": "#/definitions/PrnListItem" }
            }
          }
        }
      },
      "post": {
        "operationId": "postV1CreatePrn",
        "tags": ["packaging-recycling-notes"],
        "parameters": [
          { "type": "string", "name": "organisationId", "in": "path", "required": true },
          { "type": "string", "name": "registrationId", "in": "path", "required": true },
          { "type": "string", "name": "accreditationId", "in": "path", "required": true },
          {
            "in": "body",
            "name": "body",
            "schema": { "$ref": "#/definitions/PrnCreatePayload" }
          }
        ],
        "responses": {
          "201": {
            "description": "PRN created",
            "schema": { "$ref": "#/definitions/PrnDetail" }
          }
        }
      }
    },
    "/v1/organisations/{organisationId}/registrations/{registrationId}/accreditations/{accreditationId}/packaging-recycling-notes/{prnId}": {
      "get": {
        "operationId": "getV1PrnById",
        "tags": ["packaging-recycling-notes"],
        "parameters": [
          { "type": "string", "name": "organisationId", "in": "path", "required": true },
          { "type": "string", "name": "registrationId", "in": "path", "required": true },
          { "type": "string", "name": "accreditationId", "in": "path", "required": true },
          { "type": "string", "name": "prnId", "in": "path", "required": true }
        ],
        "responses": {
          "200": {
            "description": "PRN details",
            "schema": { "$ref": "#/definitions/PrnDetail" }
          }
        }
      }
    },
    "/v1/organisations/{organisationId}/registrations/{registrationId}/accreditations/{accreditationId}/packaging-recycling-notes/{id}/status": {
      "post": {
        "operationId": "postV1PrnStatusUpdate",
        "tags": ["packaging-recycling-notes"],
        "parameters": [
          { "type": "string", "name": "organisationId", "in": "path", "required": true },
          { "type": "string", "name": "registrationId", "in": "path", "required": true },
          { "type": "string", "name": "accreditationId", "in": "path", "required": true },
          { "type": "string", "name": "id", "in": "path", "required": true, "description": "24-character hex string" },
          {
            "in": "body",
            "name": "body",
            "schema": {
              "type": "object",
              "properties": {
                "status": { "$ref": "#/definitions/PrnStatus" }
              },
              "required": ["status"]
            }
          }
        ],
        "responses": {
          "200": {
            "description": "PRN status updated",
            "schema": {
              "type": "object",
              "properties": {
                "id": { "type": "string" },
                "prnNumber": { "type": "string" },
                "tonnage": { "type": "number" },
                "material": { "type": "string" },
                "issuedToOrganisation": { "type": "object" },
                "status": { "$ref": "#/definitions/PrnStatus" },
                "updatedAt": { "type": "string", "format": "date-time" }
              }
            }
          }
        }
      }
    },
    "/v1/packaging-recycling-notes": {
      "get": {
        "operationId": "getV1PrnsForApiGateway",
        "tags": ["packaging-recycling-notes"],
        "description": "Used by API gateway clients",
        "parameters": [
          {
            "type": "array",
            "items": { "type": "string", "enum": ["awaiting_acceptance", "cancelled"] },
            "name": "statuses",
            "in": "query",
            "required": true
          },
          { "type": "string", "name": "dateFrom", "in": "query", "required": false, "format": "date-time" },
          { "type": "string", "name": "dateTo", "in": "query", "required": false, "format": "date-time" },
          { "type": "number", "name": "limit", "in": "query", "required": false, "minimum": 1 },
          { "type": "string", "name": "cursor", "in": "query", "required": false }
        ],
        "responses": {
          "200": {
            "description": "Paginated PRN list",
            "schema": { "$ref": "#/definitions/PaginatedPrnResponse" }
          }
        }
      }
    },
    "/v1/packaging-recycling-notes/{prnNumber}/accept": {
      "post": {
        "operationId": "postV1PrnAccept",
        "tags": ["packaging-recycling-notes"],
        "description": "Used by API gateway clients",
        "parameters": [
          { "type": "string", "name": "prnNumber", "in": "path", "required": true, "maxLength": 20 },
          {
            "in": "body",
            "name": "body",
            "schema": {
              "type": "object",
              "properties": {
                "acceptedAt": { "type": "string", "format": "date-time" }
              }
            }
          }
        ],
        "responses": {
          "200": {
            "description": "PRN accepted",
            "schema": { "$ref": "#/definitions/PrnDetail" }
          }
        }
      }
    },
    "/v1/packaging-recycling-notes/{prnNumber}/reject": {
      "post": {
        "operationId": "postV1PrnReject",
        "tags": ["packaging-recycling-notes"],
        "description": "Used by API gateway clients",
        "parameters": [
          { "type": "string", "name": "prnNumber", "in": "path", "required": true, "maxLength": 20 },
          {
            "in": "body",
            "name": "body",
            "schema": {
              "type": "object",
              "properties": {
                "rejectedAt": { "type": "string", "format": "date-time" }
              }
            }
          }
        ],
        "responses": {
          "200": {
            "description": "PRN rejected",
            "schema": { "$ref": "#/definitions/PrnDetail" }
          }
        }
      }
    },
    "/v1/admin/packaging-recycling-notes": {
      "get": {
        "operationId": "getV1AdminPrns",
        "tags": ["packaging-recycling-notes"],
        "parameters": [
          {
            "type": "array",
            "items": { "type": "string" },
            "name": "statuses",
            "in": "query",
            "required": true
          },
          { "type": "number", "name": "limit", "in": "query", "required": false, "minimum": 1, "maximum": 1000 },
          { "type": "string", "name": "cursor", "in": "query", "required": false }
        ],
        "responses": {
          "200": {
            "description": "Paginated admin PRN list",
            "schema": { "$ref": "#/definitions/PaginatedPrnResponse" }
          }
        }
      }
    },
    "/v1/overseas-sites": {
      "get": {
        "operationId": "getV1OverseasSites",
        "tags": ["overseas-sites"],
        "description": "Behind isOverseasSitesEnabled feature flag",
        "parameters": [
          { "type": "string", "name": "name", "in": "query", "required": false },
          { "type": "string", "name": "country", "in": "query", "required": false }
        ],
        "responses": {
          "200": {
            "description": "List of overseas sites",
            "schema": {
              "type": "array",
              "items": { "$ref": "#/definitions/OverseasSite" }
            }
          }
        }
      },
      "post": {
        "operationId": "postV1OverseasSite",
        "tags": ["overseas-sites"],
        "description": "Behind isOverseasSitesEnabled feature flag",
        "parameters": [
          {
            "in": "body",
            "name": "body",
            "schema": { "$ref": "#/definitions/OverseasSiteCreatePayload" }
          }
        ],
