  "definitions": {
    "ApplyPayload": {
      "type": "object",
      "description": "Organisation application payload - validated by custom function"
    },
    "RegistrationAndAccreditationPayload": {
      "type": "object",
      "description": "Registration/accreditation application payload - shared schema"
    },
    "SummaryLogStatus": {
      "type": "string",
      "enum": [
        "preprocessing",
        "rejected",
        "validating",
        "invalid",
        "validated",
        "submitting",
        "submitted",
        "superseded",
        "validation_failed",
        "submission_failed"
      ]
    },
    "ValidationIssueType": {
      "type": "string",
      "enum": ["error", "warning"]
    },
    "ValidationIssueLocation": {
      "type": "object",
      "properties": {
        "field": { "type": "string" },
        "sheet": { "type": "string" },
        "table": { "type": "string" },
        "row": { "type": "number" },
        "rowId": { "type": "string" },
        "header": { "type": "string" },
        "column": { "type": "string" }
      }
    },
    "ValidationIssue": {
      "type": "object",
      "properties": {
        "type": { "$ref": "#/definitions/ValidationIssueType" },
        "code": { "type": "string" },
        "errorCode": { "type": "string" },
        "header": { "type": "string" },
        "column": { "type": "string" },
        "actual": {},
        "expected": {},
        "location": { "$ref": "#/definitions/ValidationIssueLocation" }
      },
      "required": ["code", "errorCode"]
    },
    "LoadCategory": {
      "type": "object",
      "properties": {
        "count": { "type": "integer", "minimum": 0 },
        "rowIds": {
          "type": "array",
          "maxItems": 100,
          "items": {
            "x-alternatives": [
              { "type": "string" },
              { "type": "number" }
            ]
          }
        }
      },
      "required": ["count", "rowIds"]
    },
    "LoadValidity": {
      "type": "object",
      "properties": {
        "valid": { "$ref": "#/definitions/LoadCategory" },
        "invalid": { "$ref": "#/definitions/LoadCategory" },
        "included": { "$ref": "#/definitions/LoadCategory" },
        "excluded": { "$ref": "#/definitions/LoadCategory" }
      },
      "required": ["valid", "invalid", "included", "excluded"]
    },
    "Loads": {
      "type": "object",
      "properties": {
        "added": { "$ref": "#/definitions/LoadValidity" },
        "unchanged": { "$ref": "#/definitions/LoadValidity" },
        "adjusted": { "$ref": "#/definitions/LoadValidity" }
      },
      "required": ["added", "unchanged", "adjusted"]
    },
    "SummaryLogResponse": {
      "type": "object",
      "properties": {
        "status": { "$ref": "#/definitions/SummaryLogStatus" },
        "validation": {
          "type": "object",
          "properties": {
            "failures": {
              "type": "array",
              "items": { "$ref": "#/definitions/ValidationIssue" }
            },
            "concerns": {
              "type": "object",
              "additionalProperties": {
                "type": "object",
                "properties": {
                  "sheet": { "type": "string" },
                  "rows": {
                    "type": "array",
                    "items": {
                      "type": "object",
                      "properties": {
                        "row": { "type": "number" },
                        "issues": {
                          "type": "array",
                          "items": { "$ref": "#/definitions/ValidationIssue" }
                        }
                      },
                      "required": ["row", "issues"]
                    }
                  }
                },
                "required": ["sheet", "rows"]
              }
            }
          },
          "required": ["failures", "concerns"]
        },
        "loads": { "$ref": "#/definitions/Loads" },
        "processingType": { "type": "string" },
        "material": { "type": "string" },
        "accreditationNumber": { "type": "string" }
      },
      "required": ["status"]
    },
    "SummaryLogsCreatePayload": {
      "type": "object",
      "properties": {
        "redirectUrl": { "type": "string" }
      },
      "required": ["redirectUrl"]
    },
    "UploadFileStatus": {
      "type": "string",
      "enum": ["complete", "rejected", "pending"]
    },
    "UploadCompletedPayload": {
      "type": "object",
      "properties": {
        "form": {
          "type": "object",
          "properties": {
            "summaryLogUpload": {
              "type": "object",
              "properties": {
                "fileId": { "type": "string" },
                "filename": { "type": "string" },
                "fileStatus": { "$ref": "#/definitions/UploadFileStatus" },
                "s3Bucket": { "type": "string", "description": "Required when fileStatus is complete" },
                "s3Key": { "type": "string", "description": "Required when fileStatus is complete" },
                "hasError": { "type": "boolean" },
                "errorMessage": { "type": "string" }
              },
              "required": ["fileId", "filename", "fileStatus"]
            }
          },
          "required": ["summaryLogUpload"]
        }
      },
      "required": ["form"]
    },
    "SummaryLogUploadsReportResponse": {
      "type": "object",
      "properties": {
        "summaryLogUploads": {
          "type": "array",
          "items": {
            "type": "object",
            "properties": {
              "appropriateAgency": { "type": "string" },
              "type": { "type": "string", "enum": ["Reprocessor", "Exporter"] },
              "businessName": { "type": "string" },
              "orgId": { "type": "number" },
              "registrationNumber": { "type": "string" },
              "accreditationNumber": { "type": "string" },
              "reprocessingSite": { "type": "string" },
              "packagingWasteCategory": {
                "type": "string",
                "enum": ["Aluminium", "Fibre based composite", "Paper and board", "Plastic", "Steel", "Wood", "Glass-remelt", "Glass-other", "Glass-remelt-other"]
              },
              "lastSuccessfulUpload": { "type": "string" },
              "lastFailedUpload": { "type": "string" },
              "successfulUploads": { "type": "number" },
              "failedUploads": { "type": "number" }
            },
            "required": ["appropriateAgency", "type", "businessName", "orgId", "registrationNumber", "accreditationNumber", "reprocessingSite", "packagingWasteCategory", "lastSuccessfulUpload", "lastFailedUpload", "successfulUploads", "failedUploads"]
          }
        },
        "generatedAt": { "type": "string", "format": "date-time" }
      },
      "required": ["summaryLogUploads", "generatedAt"]
    },
    "WasteBalanceResponse": {
      "type": "object",
      "description": "Object keyed by accreditation ID (24-char hex)",
      "additionalProperties": {
        "type": "object",
        "properties": {
          "amount": { "type": "number" },
          "availableAmount": { "type": "number" }
        },
        "required": ["amount", "availableAmount"]
      }
    },
    "WasteBalanceAvailabilityResponse": {
      "type": "object",
      "properties": {
        "generatedAt": { "type": "string", "format": "date-time" },
        "materials": {
          "type": "array",
          "items": {
            "type": "object",
            "properties": {
              "material": { "$ref": "#/definitions/TonnageMonitoringMaterial" },
              "availableAmount": { "type": "number" }
            },
            "required": ["material", "availableAmount"]
          }
        },
        "total": { "type": "number" }
      },
      "required": ["generatedAt", "materials", "total"]
    },
    "TonnageMonitoringMaterial": {
      "type": "string",
      "enum": ["aluminium", "fibre", "paper", "plastic", "steel", "wood", "glass_re_melt", "glass_other"]
    },
    "TonnageMonitoringResponse": {
      "type": "object",
      "properties": {
        "generatedAt": { "type": "string", "format": "date-time" },
        "materials": {
          "type": "array",
          "items": {
            "type": "object",
            "properties": {
              "material": { "$ref": "#/definitions/TonnageMonitoringMaterial" },
              "year": { "type": "integer", "minimum": 2026, "maximum": 2100 },
              "type": { "type": "string", "enum": ["Reprocessor", "Exporter"] },
              "months": {
                "type": "array",
                "items": {
                  "type": "object",
                  "properties": {
                    "month": { "type": "string", "enum": ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sept", "Oct", "Nov", "Dec"] },
                    "tonnage": { "type": "number" }
                  },
                  "required": ["month", "tonnage"]
                }
              }
            },
            "required": ["material", "year", "type", "months"]
          }
        },
        "total": { "type": "number" }
      },
      "required": ["generatedAt", "materials", "total"]
    },
    "Material": {
      "type": "string",
      "enum": ["aluminium", "fibre", "glass", "paper", "plastic", "steel", "wood"]
    },
    "TonnageBand": {
      "type": "string",
      "enum": ["up_to_500", "up_to_5000", "up_to_10000", "over_10000"],
      "x-nullable": true
    },
    "PrnTonnageResponse": {
      "type": "object",
      "properties": {
        "generatedAt": { "type": "string", "format": "date-time" },
        "rows": {
          "type": "array",
          "items": {
            "type": "object",
            "properties": {
              "organisationName": { "type": "string" },
              "organisationId": { "type": "string" },
              "accreditationNumber": { "type": "string" },
              "material": { "$ref": "#/definitions/Material" },
              "tonnageBand": { "$ref": "#/definitions/TonnageBand" },
              "awaitingAuthorisationTonnage": { "type": "number" },
              "awaitingAcceptanceTonnage": { "type": "number" },
              "awaitingCancellationTonnage": { "type": "number" },
              "acceptedTonnage": { "type": "number" },
              "cancelledTonnage": { "type": "number" }
            },
            "required": ["organisationName", "organisationId", "accreditationNumber", "material", "tonnageBand", "awaitingAuthorisationTonnage", "awaitingAcceptanceTonnage", "awaitingCancellationTonnage", "acceptedTonnage", "cancelledTonnage"]
          }
        }
      },
      "required": ["generatedAt", "rows"]
    },
    "ReportingPeriod": {
      "type": "object",
      "properties": {
        "year": { "type": "number" },
        "period": { "type": "number" },
        "startDate": { "type": "string" },
        "endDate": { "type": "string" }
      }
    },
    "ReportDetail": {
      "type": "object",
      "description": "Aggregated report detail with material and site information",
      "properties": {
        "details": {
          "type": "object",
          "properties": {
            "material": { "type": "string" },
            "site": { "type": "object" }
          }
        }
      }
    },
    "PrnStatus": {
      "type": "string",
      "enum": ["draft", "awaiting_authorisation", "awaiting_acceptance", "accepted", "awaiting_cancellation", "cancelled", "deleted", "discarded"]
    },
    "PrnListItem": {
      "type": "object",
      "properties": {
        "id": { "type": "string" },
        "prnNumber": { "type": "string" },
        "issuedToOrganisation": { "type": "object" },
        "tonnage": { "type": "number" },
        "material": { "$ref": "#/definitions/Material" },
        "status": { "$ref": "#/definitions/PrnStatus" },
        "createdAt": { "type": "string", "format": "date-time" },
        "issuedAt": { "type": "string", "format": "date-time" },
        "wasteProcessingType": { "type": "string", "enum": ["reprocessor", "exporter"] }
      }
    },
    "PrnDetail": {
      "type": "object",
      "properties": {
        "id": { "type": "string" },
        "accreditationYear": { "type": "number" },
        "createdAt": { "type": "string", "format": "date-time" },
        "isDecemberWaste": { "type": "boolean" },
        "issuedAt": { "type": "string", "format": "date-time" },
        "issuedBy": { "type": "object" },
        "issuedToOrganisation": { "type": "object" },
        "material": { "$ref": "#/definitions/Material" },
        "notes": { "type": "string" },
        "prnNumber": { "type": "string" },
        "processToBeUsed": { "type": "string" },
        "status": { "$ref": "#/definitions/PrnStatus" },
        "tonnage": { "type": "number" },
        "wasteProcessingType": { "type": "string", "enum": ["reprocessor", "exporter"] }
      }
    },
    "PrnCreatePayload": {
      "type": "object",
      "properties": {
        "issuedToOrganisation": {
          "type": "object",
          "properties": {
            "id": { "type": "string" },
            "name": { "type": "string" },
            "tradingName": { "type": "string" },
            "registrationType": { "type": "string" }
          },
          "required": ["id", "name"]
        },
        "tonnage": { "type": "integer", "minimum": 1 },
        "notes": { "type": "string", "maxLength": 200 }
      },
      "required": ["issuedToOrganisation", "tonnage"]
    },
    "PaginatedPrnResponse": {
      "type": "object",
      "properties": {
        "items": { "type": "array", "items": { "type": "object" } },
        "hasMore": { "type": "boolean" },
        "nextCursor": { "type": "string" }
      },
      "required": ["items", "hasMore"]
    },
    "LinkedOrganisationsResponse": {
      "type": "array",
      "items": {
        "type": "object",
        "properties": {
          "id": { "type": "string" },
          "orgId": { "type": "integer" },
          "companyDetails": {
            "type": "object",
            "properties": {
              "name": { "type": "string" }
            },
            "required": ["name"]
          },
          "status": { "type": "string" },
          "linkedDefraOrganisation": {
            "type": "object",
            "properties": {
              "orgId": { "type": "string", "format": "uuid" },
              "orgName": { "type": "string" },
              "linkedBy": {
                "type": "object",
                "properties": {
                  "email": { "type": "string", "format": "email" },
                  "id": { "type": "string", "format": "uuid" }
                },
                "required": ["email", "id"]
              },
              "linkedAt": { "type": "string", "format": "date-time" }
            },
            "required": ["orgId", "orgName", "linkedBy", "linkedAt"]
          }
        },
        "required": ["id", "orgId", "companyDetails", "status", "linkedDefraOrganisation"]
      }
    },
    "OverseasSiteAddress": {
      "type": "object",
      "properties": {
        "line1": { "type": "string" },
        "line2": { "type": "string" },
        "townOrCity": { "type": "string" },
        "stateOrRegion": { "type": "string" },
        "postcode": { "type": "string" }
      },
      "required": ["line1", "townOrCity"]
    },
    "OverseasSite": {
      "type": "object",
      "properties": {
        "id": { "type": "string" },
        "name": { "type": "string" },
        "address": { "$ref": "#/definitions/OverseasSiteAddress" },
        "country": { "type": "string" },
        "coordinates": { "type": "string" },
        "validFrom": { "type": "string", "format": "date-time" }
      }
    },
    "OverseasSiteCreatePayload": {
      "type": "object",
      "properties": {
        "name": { "type": "string" },
        "address": { "$ref": "#/definitions/OverseasSiteAddress" },
        "country": { "type": "string" },
        "coordinates": { "type": "string" },
        "validFrom": { "type": "string", "format": "date-time" }
      },
      "required": ["name", "address", "country"]
    },
    "OverseasSiteUpdatePayload": {
      "type": "object",
      "description": "At least one field required",
      "properties": {
        "name": { "type": "string" },
        "address": {
          "type": "object",
          "properties": {
            "line1": { "type": "string" },
            "line2": { "type": "string" },
            "townOrCity": { "type": "string" },
            "stateOrRegion": { "type": "string" },
            "postcode": { "type": "string" }
          }
        },
        "country": { "type": "string" },
        "coordinates": { "type": "string" },
        "validFrom": { "type": "string", "format": "date-time" }
      }
    },
    "OrsImportCreatePayload": {
      "type": "object",
      "properties": {
        "redirectUrl": { "type": "string" }
      },
      "required": ["redirectUrl"]
    },
    "OrsUploadFile": {
      "type": "object",
      "properties": {
        "fileId": { "type": "string" },
        "filename": { "type": "string" },
        "fileStatus": { "$ref": "#/definitions/UploadFileStatus" },
        "s3Bucket": { "type": "string", "description": "Required when fileStatus is complete" },
        "s3Key": { "type": "string", "description": "Required when fileStatus is complete" },
        "hasError": { "type": "boolean" },
        "errorMessage": { "type": "string" }
      },
      "required": ["fileId", "filename", "fileStatus"]
    },
    "OrsUploadCompletedPayload": {
      "type": "object",
      "properties": {
        "form": {
          "type": "object",
          "properties": {
            "orsUpload": {
              "description": "Single file object or array of file objects",
              "x-alternatives": [
                { "$ref": "#/definitions/OrsUploadFile" },
                { "type": "array", "items": { "$ref": "#/definitions/OrsUploadFile" } }
              ]
            }
          },
          "required": ["orsUpload"]
        }
      },
      "required": ["form"]
    }
  }
