name: 'Test and Scan'
description: 'Run format check, lint, type check, optional build, test, and SonarCloud scan'

inputs:
  github-token:
    description: 'GitHub token for SonarCloud'
    required: true
  sonar-token:
    description: 'SonarCloud token'
    required: true
  build-command:
    description: 'Build command to run before tests (empty to skip)'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version-file: .nvmrc
        cache: npm

    - name: Install dependencies
      shell: bash
      run: npm ci --ignore-scripts

    - name: Check formatting
      shell: bash
      run: npm run format:check

    - name: Lint code
      shell: bash
      run: npm run lint

    - name: Build
      if: ${{ inputs.build-command != '' }}
      shell: bash
      run: ${{ inputs.build-command }}

    - name: Run tests
      shell: bash
      run: npm test

    - name: Write test summary
      if: always()
      shell: bash
      run: |
        {
          if [ -f coverage/test-results.json ]; then
            IFS=$'\t' read -r SP SF ST TP TF TT DUR < <(jq -r '
              def fmt_ms:
                if . >= 60000 then "\(. / 60000 | floor)m \(. / 1000 % 60 | round)s"
                elif . >= 1000 then "\(. / 1000 * 10 | round / 10)s"
                else "\(.)ms"
                end;
              [
                (.testResults | map(select(.status == "passed")) | length),
                (.testResults | map(select(.status == "failed")) | length),
                (.testResults | length),
                ([.testResults[].assertionResults[] | select(.status == "passed")] | length),
                ([.testResults[].assertionResults[] | select(.status == "failed")] | length),
                ([.testResults[].assertionResults[]] | length),
                ((([.testResults[].endTime] | max) - .startTime) | round | fmt_ms)
              ] | @tsv
            ' coverage/test-results.json)

            REPO_URL="https://github.com/${GITHUB_REPOSITORY}/blob/${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"

            SLOW_SUITES=$(jq -r --arg ws "$GITHUB_WORKSPACE/src/" --arg repo "$REPO_URL/src/" '
              def fmt_ms:
                if . >= 60000 then "\(. / 60000 | floor)m \(. / 1000 % 60 | round)s"
                elif . >= 1000 then "\(. / 1000 * 10 | round / 10)s"
                else "\(.)ms"
                end;
              [.testResults[] | {name: .name, duration: (.endTime - .startTime)}]
              | sort_by(-.duration) | .[0:5][]
              | (.name | ltrimstr($ws)) as $short
              | "| [\($short)](\($repo)\($short)) | \(.duration | fmt_ms) |"
            ' coverage/test-results.json)

            SLOW_TESTS=$(jq -r '
              def fmt_ms:
                if . >= 60000 then "\(. / 60000 | floor)m \(. / 1000 % 60 | round)s"
                elif . >= 1000 then "\(. / 1000 * 10 | round / 10)s"
                else "\(.)ms"
                end;
              [.testResults[].assertionResults[] | select(.duration > 0) | {name: .title, duration: .duration}]
              | sort_by(-.duration) | .[0:5][]
              | "| \(.name) | \(.duration | fmt_ms) |"
            ' coverage/test-results.json)

            cat <<EOF
        ## Unit Tests

        | | Passed | Failed | Total |
        |---|---|---|---|
        | Suites | $SP | $SF | $ST |
        | Tests | $TP | $TF | $TT |

        Duration: $DUR

        ### Slowest Suites

        | Suite | Duration |
        |---|---|
        $SLOW_SUITES

        ### Slowest Tests

        | Test | Duration |
        |---|---|
        $SLOW_TESTS
        EOF
          fi

          if [ -f coverage/coverage-summary.json ]; then
            read -r LINES BRANCHES FUNCTIONS STATEMENTS < <(jq -r '[
              .total.lines.pct, .total.branches.pct,
              .total.functions.pct, .total.statements.pct
            ] | @tsv' coverage/coverage-summary.json)

            cat <<EOF

        ## Coverage

        | Metric | Covered |
        |---|---|
        | Lines | ${LINES}% |
        | Branches | ${BRANCHES}% |
        | Functions | ${FUNCTIONS}% |
        | Statements | ${STATEMENTS}% |
        EOF
          fi
        } >> "$GITHUB_STEP_SUMMARY"

    # sonar.projectVersion drives the "Previous version" new-code baseline on main.
    # We use the latest release tag reachable from the checkout (CDP tags every
    # publish as 0.<n>.0). The scan runs before the build creates the new tag, so
    # this is the previous publish's version -> the baseline resets each publish.
    # Requires the caller to checkout with fetch-depth: 0 (tags + blame). See ADR-0040.
    - name: Derive Sonar args
      id: sonar
      shell: bash
      run: |
        VERSION="$(git describe --tags --abbrev=0 2>/dev/null || true)"
        if [ -n "$VERSION" ]; then
          echo "Using sonar.projectVersion=$VERSION"
          echo "args=-Dsonar.qualitygate.wait=true -Dsonar.projectVersion=$VERSION" >> "$GITHUB_OUTPUT"
        else
          echo "No git tag found; sonar.projectVersion not set (needs fetch-depth: 0)"
          echo "args=-Dsonar.qualitygate.wait=true" >> "$GITHUB_OUTPUT"
        fi

    - name: SonarCloud Scan
      if: ${{ github.actor != 'dependabot[bot]' }}
      uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2.0
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        SONAR_TOKEN: ${{ inputs.sonar-token }}
      with:
        args: ${{ steps.sonar.outputs.args }}
