name: Renovate Docker
description: Run Renovate for Docker dependency updates

inputs:
  token:
    description: GitHub token for Renovate
    required: true

runs:
  using: composite
  steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: 24
        cache: npm

    - uses: renovatebot/github-action@6d859fc95779be83a0335ca704879b47e5d79641 # v46.1.16
      with:
        renovate-version: 43.206.0
        mount-docker-socket: false
        token: ${{ inputs.token }}
      env:
        RENOVATE_REPOSITORIES: ${{ github.repository }}
        RENOVATE_ALLOWED_COMMANDS: '["^install-tool node$", "^npm install --package-lock-only --ignore-scripts$"]'
