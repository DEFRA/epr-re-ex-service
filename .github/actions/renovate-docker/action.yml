name: Renovate Docker
description: Run Renovate for Docker dependency updates

inputs:
  token:
    description: GitHub token for Renovate
    required: true

runs:
  using: composite
  steps:
    - uses: actions/checkout@v6

    - uses: actions/setup-node@v4
      with:
        node-version: 24
        cache: npm

    - uses: renovatebot/github-action@v46.1.8
      with:
        renovate-version: 43.108.1
        mount-docker-socket: false
        token: ${{ inputs.token }}
      env:
        RENOVATE_REPOSITORIES: ${{ github.repository }}
