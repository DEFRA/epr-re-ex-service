name: Renovate Docker
description: Run Renovate for Docker dependency updates

inputs:
  token:
    description: GitHub token for Renovate
    required: true

runs:
  using: composite
  steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
      with:
        node-version: 24
        cache: npm

    - uses: renovatebot/github-action@b67590ea780158ccd13192c22a3655a5231f869d # v46.1.8
      with:
        renovate-version: 43.108.1
        mount-docker-socket: false
        token: ${{ inputs.token }}
      env:
        RENOVATE_REPOSITORIES: ${{ github.repository }}
