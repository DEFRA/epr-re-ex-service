name: Renovate Docker
description: Run Renovate for Docker dependency updates

inputs:
  token:
    description: GitHub token for Renovate
    required: true

runs:
  using: composite
  steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
      with:
        node-version: 24
        cache: npm

    - uses: renovatebot/github-action@b50d2ba2bd928235abdcc14d06dfafc217f1c565 # v46.1.18
      with:
        renovate-version: 43.206.0
        mount-docker-socket: false
        token: ${{ inputs.token }}
      env:
        RENOVATE_REPOSITORIES: ${{ github.repository }}
        RENOVATE_ALLOWED_COMMANDS: '["^install-tool node$", "^npm install --package-lock-only --ignore-scripts$"]'
