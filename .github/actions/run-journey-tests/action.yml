name: Run Journey Tests
description: >-
  Shared journey-test runner for EPR service repos. Checks out the service's
  journey-tests repo, brings up the stack, runs the suite, and writes a PR
  summary. Behaviour that differs per service is supplied via inputs.

inputs:
  service:
    description: service name, e.g. epr-frontend (also the built image name under defradigital/)
    required: true
  service-repo:
    description: service GitHub repo, e.g. DEFRA/epr-frontend
    required: true
  journey-tests-repo:
    description: journey-tests GitHub repo, e.g. DEFRA/epr-frontend-journey-tests
    required: true
  image-env:
    description: compose env var carrying the service image tag, e.g. EPR_FRONTEND
    required: true
  image-sha:
    description: published image tag for the service under test (a client passes github.sha)
  branch:
    description: journey-tests branch to run
    default: main
  journey-test-pr:
    description: is this action being called from a PR in the journey-tests repo?
    default: 'false'
  health-port:
    description: local port to poll for /health readiness
    required: true
  health-label:
    description: label used in the readiness log line (defaults to the service name)
    default: ''
  test-command:
    description: npm script that runs the suite
    default: npm run test:github
  build-backend:
    description: build epr-backend from a matching branch and wire it into compose
    default: 'false'
  extra-compose-env:
    description: additional newline-separated KEY=VALUE pairs for docker compose
    default: ''
  add-hosts:
    description: newline-separated /etc/hosts entries to add before the stack starts
    default: ''
  artifact-suffix:
    description: suffix appended to uploaded artifact names to keep concurrent runs distinct
    default: ''
  build-start:
    description: epoch seconds when the service docker build started (for the summary)
    default: ''
  test-start:
    description: epoch seconds when the tests started (for the summary)
    default: ''

runs:
  using: composite
  steps:
    - name: Checkout journey-tests repository if not called by Journey Test PR
      if: inputs.journey-test-pr == 'false'
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        repository: ${{ inputs.journey-tests-repo }}
        ref: ${{ inputs.branch }}

    - name: Check for matching service branch if it is Journey Test PR
      if: inputs.journey-test-pr != 'false'
      id: service-branch
      shell: bash
      env:
        BRANCH: ${{ github.head_ref }}
        SERVICE_REPO: ${{ inputs.service-repo }}
      run: |
        if git ls-remote --heads "https://github.com/${SERVICE_REPO}.git" "$BRANCH" | grep -q .; then
          echo "ref=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "exists=true" >> "$GITHUB_OUTPUT"
        else
          echo "ref=main" >> "$GITHUB_OUTPUT"
          echo "exists=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Checkout service repository if a matching branch exists
      if: inputs.journey-test-pr != 'false' && steps.service-branch.outputs.exists == 'true'
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        repository: ${{ inputs.service-repo }}
        ref: ${{ steps.service-branch.outputs.ref }}
        path: ${{ inputs.service }}

    - name: Build service image from the matching branch
      if: inputs.journey-test-pr != 'false' && steps.service-branch.outputs.exists == 'true'
      id: docker-branch
      shell: bash
      env:
        SERVICE: ${{ inputs.service }}
      run: |
        cd "$SERVICE"
        SHA=$(git rev-parse --short HEAD)
        docker build -t "defradigital/${SERVICE}:${SHA}" .
        echo "image=$SHA" >> "$GITHUB_OUTPUT"

    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version-file: .nvmrc
        cache: npm

    - name: Upgrade npm
      shell: bash
      run: npm install -g npm@11.12.1

    - name: Install
      shell: bash
      run: npm ci

    - name: Add hosts entries
      if: inputs.add-hosts != ''
      shell: bash
      env:
        ADD_HOSTS: ${{ inputs.add-hosts }}
      run: |
        while IFS= read -r entry; do
          [ -n "$entry" ] && echo "$entry" | sudo tee -a /etc/hosts
        done <<< "$ADD_HOSTS"
        cat /etc/hosts

    - name: Check for matching epr-backend branch
      if: inputs.build-backend == 'true'
      id: backend-branch
      shell: bash
      env:
        BRANCH: ${{ github.head_ref }}
      run: |
        if git ls-remote --heads https://github.com/DEFRA/epr-backend.git "$BRANCH" | grep -q .; then
          echo "ref=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "exists=true" >> "$GITHUB_OUTPUT"
          echo "::notice::Found matching epr-backend branch: $BRANCH — will build from source"
        else
          echo "exists=false" >> "$GITHUB_OUTPUT"
          echo "::notice::No matching epr-backend branch '$BRANCH' — using latest published image"
        fi

    - name: Checkout epr-backend repository if a matching branch exists
      if: inputs.build-backend == 'true' && steps.backend-branch.outputs.exists == 'true'
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        repository: DEFRA/epr-backend
        ref: ${{ steps.backend-branch.outputs.ref }}
        path: epr-backend

    - name: Build epr-backend image from the matching branch
      if: inputs.build-backend == 'true' && steps.backend-branch.outputs.exists == 'true'
      id: docker-backend-branch
      shell: bash
      run: |
        cd epr-backend
        SHA=$(git rev-parse --short HEAD)
        docker build -t "defradigital/epr-backend:${SHA}" .
        echo "image=$SHA" >> "$GITHUB_OUTPUT"

    - name: Start docker compose
      shell: bash
      env:
        IMAGE_ENV: ${{ inputs.image-env }}
        IMAGE_SHA_INPUT: ${{ inputs.image-sha }}
        IMAGE_SHA_BUILT: ${{ steps.docker-branch.outputs.image }}
        BUILD_BACKEND: ${{ inputs.build-backend }}
        BACKEND_IMAGE: ${{ steps.docker-backend-branch.outputs.image }}
        EXTRA_ENV: ${{ inputs.extra-compose-env }}
      run: |
        SERVICE_IMAGE="${IMAGE_SHA_BUILT:-$IMAGE_SHA_INPUT}"
        ENV_ARGS=( "${IMAGE_ENV}=${SERVICE_IMAGE}" )
        if [ "$BUILD_BACKEND" = "true" ]; then
          ENV_ARGS+=( "EPR_BACKEND=${BACKEND_IMAGE}" )
        fi
        while IFS= read -r line; do
          [ -n "$line" ] && ENV_ARGS+=( "$line" )
        done <<< "$EXTRA_ENV"
        env "${ENV_ARGS[@]}" docker compose up --wait-timeout 300 -d --quiet-pull

    - name: Wait for services to be ready
      shell: bash
      env:
        HEALTH_PORT: ${{ inputs.health-port }}
        HEALTH_LABEL: ${{ inputs.health-label || inputs.service }}
      run: |
        echo "Waiting for ${HEALTH_LABEL} to be ready..."
        timeout 180 bash -c "until curl -f http://localhost:${HEALTH_PORT}/health; do sleep 5; done"

    - name: Run the tests
      shell: bash
      env:
        TEST_COMMAND: ${{ inputs.test-command }}
      run: |
        $TEST_COMMAND
        npm run report

    - name: debug
      if: always()
      shell: bash
      run: |
        docker compose logs > logs.txt
        docker ps

    - name: Upload allure report
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: allure-report${{ inputs.artifact-suffix }}
        path: ./allure-report

    - name: Upload docker compose logs
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: docker-compose-logs${{ inputs.artifact-suffix }}
        path: ./logs.txt

    - name: Write journey test summary
      if: always()
      shell: bash
      env:
        BUILD_START: ${{ inputs.build-start }}
        TEST_START: ${{ inputs.test-start }}
      run: |
        if [ -n "$BUILD_START" ] && [ -n "$TEST_START" ]; then
          export DOCKER_SECONDS=$(( TEST_START - BUILD_START ))
          export TEST_SECONDS=$(( $(date +%s) - TEST_START ))
        fi
        node "${{ github.action_path }}/summary.mjs" >> "$GITHUB_STEP_SUMMARY" || true

    - name: Fail this step if FAILED file exists
      if: always()
      shell: bash
      run: |
        if [ -f "FAILED" ]; then
          exit 1
        fi
