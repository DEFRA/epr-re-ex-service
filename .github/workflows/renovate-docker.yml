name: Renovate Docker

on:
  schedule:
    - cron: '0 2 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  statuses: write

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/renovate-docker
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
