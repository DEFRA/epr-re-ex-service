name: Check Pull Request

on:
  pull_request:
    branches:
      - '*'
    types:
      - opened
      - reopened
      - synchronize

jobs:
  detect-changes:
    name: Detect Changed Files
    runs-on: ubuntu-latest
    outputs:
      docs-only: ${{ steps.check.outputs.docs-only }}
    steps:
      - name: Check for docs-only changes
        id: check
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number
            });

            const docsOnly = files.length > 0 && files.every(file => file.filename.endsWith('.md') || file.filename.startsWith('docs/'));

            core.setOutput('docs-only', docsOnly);
            console.log(`Documentation-only changes: ${docsOnly}`);
            console.log(`Changed files: ${files.map(f => f.filename).join(', ')}`)

  pr-prep:
    name: Preparation
    runs-on: ubuntu-latest
    needs: detect-changes
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Prepare PR
        uses: ./.github/actions/pr-preparation

      - name: Check for ADR numbering conflicts
        if: ${{ github.actor != 'dependabot[bot]' && !startsWith(github.head_ref, 'dependabot/') && !startsWith(github.head_ref, 'snyk-') }}
        run: |
          DOCS_DIR=docs/architecture/decisions

          if [ -d "$DOCS_DIR" ]; then
            cd $DOCS_DIR
            duplicates=$(ls -1 *.md | grep -E '^[0-9]{4}-' | sed 's/^\([0-9]\{4\}\)-.*/\1/' | sort | uniq -d)
            if [ -n "$duplicates" ]; then
              echo "Error: Duplicate ADR numbers found:"
              echo "$duplicates"
              exit 1
            fi
            echo "No ADR numbering conflicts found"
          fi

  pr-validator:
    name: Run Pull Request Checks
    runs-on: ubuntu-latest
    needs: [pr-prep, detect-changes]
    if: needs.detect-changes.outputs.docs-only != 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Test and Scan
        uses: ./.github/actions/test-and-scan
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          sonar-token: ${{ secrets.SONAR_TOKEN }}

  type-check:
    name: Lint Types (advisory)
    runs-on: ubuntu-latest
    needs: [pr-prep, detect-changes]
    if: needs.detect-changes.outputs.docs-only != 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Upgrade npm
        run: npm install -g npm@11.12.1

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Install nested package dependencies
        working-directory: otel
        run: npm ci --ignore-scripts

      - name: Lint types
        run: |
          OUTPUT=$(npm run lint:types 2>&1) && STATUS=0 || STATUS=$?
          echo "$OUTPUT"

          ERRORS=$(echo "$OUTPUT" | grep -cE "error TS[0-9]+" || true)

          {
            if [ "$STATUS" -eq 0 ]; then
              echo "## Lint Types"
              echo ""
              echo ":white_check_mark: Type check passed"
            else
              echo "## Lint Types"
              echo ""
              echo ":warning: **${ERRORS} type errors found** (advisory — not blocking)"
              echo ""
              echo "<details><summary>Errors by file</summary>"
              echo ""
              echo '```'
              echo "$OUTPUT" | grep -E "error TS[0-9]+" | sed 's/(.*/:/' | sort | uniq -c | sort -rn
              echo '```'
              echo "</details>"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
