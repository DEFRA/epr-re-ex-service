version: 2

updates:
  # Update npm packages
  - package-ecosystem: npm
    directory: /
    open-pull-requests-limit: 10

    # Group packages into shared PR
    groups:
      dev:
        applies-to: 'version-updates'
        dependency-type: 'development'
        update-types:
          - 'minor'
          - 'patch'
        patterns:
          - '*'

      prod:
        applies-to: 'version-updates'
        dependency-type: 'production'
        update-types:
          - 'minor'
          - 'patch'
        patterns:
          - '*'

      security:
        applies-to: 'security-updates'
        patterns:
          - '*'

      other:
        update-types:
          - 'minor'
          - 'patch'
        patterns:
          - '*'

    # Schedule run nightly
    schedule:
      interval: 'cron'
      cronjob: '0 0 * * *'

    cooldown:
      default-days: 3

    versioning-strategy: increase

    allow:
      # Include direct package.json updates
      - dependency-type: direct

  # Update npm packages bundled with the lint-types-tests composite action
  - package-ecosystem: npm
    directory: /.github/actions/lint-types-tests
    open-pull-requests-limit: 5
    schedule:
      interval: 'cron'
      cronjob: '0 0 * * *'
    cooldown:
      default-days: 3
    versioning-strategy: increase
    allow:
      - dependency-type: direct

  # Update GitHub Actions
  - package-ecosystem: github-actions
    directory: /

    # Schedule run nightly
    schedule:
      interval: 'cron'
      cronjob: '0 0 * * *'
